const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── Utilities ───────────────────────────────────────────────────────────────
const genId = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const now = () => new Date().toISOString();
const fmt = (iso) => iso ? new Date(iso).toLocaleDateString('zh-CN') : '—';
const fmtPrice = (p) => p != null && p !== '' ? `¥${Number(p).toFixed(2)}` : '—';
const daysBetween = (a, b) => Math.floor((new Date(b) - new Date(a)) / 86400000);
const today = () => new Date().toISOString().slice(0, 10);

function expiryStatus(expirationDate) {
  if (!expirationDate) return null;
  const diff = daysBetween(today(), expirationDate);
  if (diff < 0) return { label: '已过期', color: '#FF3B30', level: 0 };
  if (diff <= 7) return { label: '即将到期', color: '#FF9500', level: 1 };
  if (diff <= 30) return { label: '30天内', color: '#FFCC00', level: 2 };
  return { label: '正常', color: '#34C759', level: 3 };
}

// ─── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'stuffbox_data';
const BRANDS_KEY = 'stuffbox_brands';
const ATTR_TEMPLATES_KEY = 'stuffbox_attr_templates';

const emptyStore = () => ({ categories: [], items: [], usageRecords: [], stockRecords: [], itemAttributes: [] });

function loadStore() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return emptyStore();
    return { ...emptyStore(), ...JSON.parse(raw) };
  } catch { return emptyStore(); }
}

function saveStore(store) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
}

function loadBrands() {
  try { return JSON.parse(localStorage.getItem(BRANDS_KEY) || '[]'); } catch { return []; }
}
function saveBrands(brands) {
  localStorage.setItem(BRANDS_KEY, JSON.stringify(brands));
}

function loadAttrTemplates() {
  try { return JSON.parse(localStorage.getItem(ATTR_TEMPLATES_KEY) || '{}'); } catch { return {}; }
}
function saveAttrTemplates(tpls) {
  localStorage.setItem(ATTR_TEMPLATES_KEY, JSON.stringify(tpls));
}

const UNITS_KEY = 'stuffbox_units';
const DEFAULT_UNITS = ['个','件','包','盒','瓶','罐','袋','套','双','对','本','册','张','片','块','颗','粒','支','管','条','根','卷','箱','桶','升','毫升','克','千克','米','厘米'];

function loadUnits() {
  try {
    const raw = localStorage.getItem(UNITS_KEY);
    if (!raw) return [...DEFAULT_UNITS];
    return JSON.parse(raw);
  } catch { return [...DEFAULT_UNITS]; }
}
function saveUnits(units) {
  localStorage.setItem(UNITS_KEY, JSON.stringify(units));
}

// ─── Sheet Modal ──────────────────────────────────────────────────────────────
function Sheet({ open, onClose, title, children }) {
  const [visible, setVisible] = useState(false);
  const [anim, setAnim] = useState(false);
  useEffect(() => {
    if (open) {
      setVisible(true);
      requestAnimationFrame(() => setAnim(true));
      document.body.style.overflow = 'hidden';
    } else {
      setAnim(false);
      setTimeout(() => setVisible(false), 280);
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  if (!visible) return null;
  return (
    <div style={S.overlay} onClick={onClose} onTouchMove={e => e.stopPropagation()}>
      <div style={{ ...S.sheet, transform: anim ? 'translateY(0)' : 'translateY(100%)', transition:'transform 0.28s cubic-bezier(0.32,0.72,0,1)' }}
           onClick={e => e.stopPropagation()}
           onTouchMove={e => e.stopPropagation()}>
        <div style={S.sheetHandle} />
        {title && <div style={S.sheetTitle}>{title}</div>}
        {children}
      </div>
    </div>
  );
}

// ─── Swipeable Item Row ───────────────────────────────────────────────────────
function SwipeRow({ children, onSwipeAction, actionLabel='记录一次', actionColor='#007AFF' }) {
  const [offset, setOffset] = useState(0);
  const startX = useRef(0);
  const startY = useRef(0);
  const isDragging = useRef(false);
  const isHoriz = useRef(false);
  const ACTION_W = 90;

  const onTouchStart = (e) => {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    isDragging.current = true;
    isHoriz.current = false;
  };
  const onTouchMove = (e) => {
    if (!isDragging.current) return;
    const dx = e.touches[0].clientX - startX.current;
    const dy = e.touches[0].clientY - startY.current;
    if (!isHoriz.current) {
      if (Math.abs(dy) > Math.abs(dx) + 4) { isDragging.current = false; return; }
      if (Math.abs(dx) > 8) isHoriz.current = true;
    }
    if (!isHoriz.current) return;
    e.preventDefault();
    const raw = offset + dx;
    setOffset(Math.max(-ACTION_W, Math.min(0, raw)));
  };
  const onTouchEnd = () => {
    isDragging.current = false;
    setOffset(prev => prev < -ACTION_W/2 ? -ACTION_W : 0);
  };

  return (
    <div style={{ position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', right:0, top:0, bottom:0, width:ACTION_W, background:actionColor, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}
           onClick={() => { setOffset(0); onSwipeAction(); }}>
        <span style={{ color:'#fff', fontSize:'13px', fontWeight:'600', textAlign:'center' }}>{actionLabel}</span>
      </div>
      <div style={{ transform:`translateX(${offset}px)`, transition: isDragging.current ? 'none' : 'transform 0.2s ease', willChange:'transform', background:'#fff', position:'relative', zIndex:1 }}
           onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        {children}
      </div>
    </div>
  );
}

// ─── Item Form ────────────────────────────────────────────────────────────────
function ItemForm({ initial, categories, allItems, onSave, onClose }) {
  const [form, setForm] = useState(() => ({
    name: '', brand: '', notes: '', iconName: '📦', categoryId: '',
    purchasePrice: '', purchaseDate: '', quantity: 1, unit: '', rating: 0,
    status: 0, expirationDate: '', notifyDaysBefore: 7,
    parentItemId: null,
    ...initial,
  }));
  const [attrs, setAttrs] = useState(() => initial?._attrs || []);
  const [accessories, setAccessories] = useState(() => initial?._accessories || []);
  const [showAccForm, setShowAccForm] = useState(false);
  const [accForm, setAccForm] = useState({ name:'', brand:'', iconName:'📦', purchasePrice:'', purchaseDate:'' });
  const [showTplPicker, setShowTplPicker] = useState(false);
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const allCats = categories;
  const scenes = allCats.filter(c => !c.parentId);
  const subs = allCats.filter(c => c.parentId);

  const addAttr = () => setAttrs(a => [...a, { id: genId(), key:'', value:'', sortOrder: a.length }]);
  const updateAttr = (i, k, v) => setAttrs(a => a.map((x,j) => j===i ? {...x,[k]:v} : x));
  const removeAttr = (i) => setAttrs(a => a.filter((_,j) => j!==i));

  // Get attr templates for category (real-time, no cache)
  const getCatAttrTpls = (categoryId) => {
    if (!categoryId) return [];
    const allTpls = loadAttrTemplates();
    const selectedCat = categories.find(c => c.id === categoryId);
    const ownTpls = allTpls[categoryId] || [];
    const parentTpls = (selectedCat && selectedCat.parentId)
      ? (allTpls[selectedCat.parentId] || []).map(t => ({ ...t, _fromScene: true }))
      : [];
    const ownKeys = new Set(ownTpls.map(t => t.key.trim()));
    return [
      ...parentTpls.filter(t => !ownKeys.has(t.key.trim())),
      ...ownTpls,
    ];
  };

  const applyAttrTemplates = () => {
    const catId = form.categoryId;
    if (!catId) { alert('请先选择分类'); return; }
    const tplList = getCatAttrTpls(catId);
    if (tplList.length === 0) { alert('当前分类没有属性模板，请先在设置中添加'); return; }
    setAttrs(prev => {
      const existingKeys = prev.map(a => a.key.trim());
      const newAttrs = tplList
        .filter(t => !existingKeys.includes(t.key.trim()))
        .map((t, i) => ({ id: genId(), key: t.key, value: '', sortOrder: prev.length + i }));
      if (newAttrs.length === 0) { alert('所有模板属性已存在'); return prev; }
      return [...prev, ...newAttrs];
    });
  };

  // Calculate totals
  const mainPrice = Number(form.purchasePrice) || 0;
  const accTotal = accessories.reduce((s, a) => s + (Number(a.purchasePrice) || 0), 0);
  const grandTotal = mainPrice + accTotal;

  const saveAcc = () => {
    if (!accForm.name.trim()) return alert('请输入附加物名称');
    setAccessories(a => [...a, { id: genId(), ...accForm, name: accForm.name.trim(), quantity:1, status:0, timesUsed:0, firstUsedAt:null, lastUsedAt:null, createdAt: now(), updatedAt: now() }]);
    setAccForm({ name:'', brand:'', iconName:'📦', purchasePrice:'', purchaseDate:'' });
    setShowAccForm(false);
  };
  const removeAcc = (id) => setAccessories(a => a.filter(x => x.id !== id));

  const handleSave = () => {
    if (!form.name.trim()) return alert('请输入物品名称');
    // 同步新品牌
    const brandName = form.brand?.trim();
    if (brandName) {
      const existingBrands = loadBrands();
      if (!existingBrands.some(b => b.name === brandName)) {
        saveBrands([...existingBrands, { id: genId(), name: brandName, note:'', sceneId:'', sortOrder: existingBrands.length }]);
      }
    }
    // 同步新属性到模板
    const catId = form.categoryId;
    if (catId && attrs.length > 0) {
      const tpls = loadAttrTemplates();
      const catTpls = tpls[catId] ? [...tpls[catId]] : [];
      attrs.forEach(attr => {
        if (!attr.key.trim()) return;
        const existing = catTpls.find(t => t.key === attr.key.trim());
        if (!existing) {
          catTpls.push({ id: genId(), key: attr.key.trim(), options: attr.value.trim() ? [attr.value.trim()] : [], sortOrder: catTpls.length });
        } else if (attr.value.trim() && !existing.options.includes(attr.value.trim())) {
          existing.options.push(attr.value.trim());
        }
      });
      saveAttrTemplates({ ...tpls, [catId]: catTpls });
    }
    onSave({ ...form, name: form.name.trim(), quantity: Math.max(1, Number(form.quantity)||1) }, attrs, accessories);
  };

  const inputStyle = { ...S.input };
  const fieldWrap = { marginBottom:'14px' };

  return (
    <div style={{ padding:'16px', paddingBottom:'32px' }}>
      {/* 图标 + 名称 */}
      <div style={{ display:'flex', gap:'12px', alignItems:'flex-start', marginBottom:'14px' }}>
        <div>
          <div style={S.label}>图标</div>
          <EmojiPicker value={form.iconName} onChange={v => set('iconName', v)} />
        </div>
        <div style={{ flex:1 }}>
          <div style={S.label}>名称 *</div>
          <input style={inputStyle} value={form.name} onChange={e => set('name', e.target.value)} placeholder="物品名称" />
        </div>
      </div>

      <div style={fieldWrap}>
        <div style={S.label}>品牌</div>
        <div style={{ position:'relative' }}>
          <input style={inputStyle} value={form.brand||''} onChange={e => set('brand', e.target.value)} placeholder="可选" />
          {(() => {
            const suggestions = loadBrands().filter(b => b.name && (!form.brand || b.name.toLowerCase().includes((form.brand||'').toLowerCase())));
            return suggestions.length > 0 && form.brand ? (
              <div style={{ position:'absolute', top:'100%', left:0, right:0, background:'#fff', border:'1px solid #E5E5EA', borderRadius:'8px', zIndex:100, maxHeight:'140px', overflowY:'auto', boxShadow:'0 4px 12px rgba(0,0,0,0.1)' }}>
                {suggestions.map(b => (
                  <div key={b.id} onMouseDown={e=>{e.preventDefault();set('brand',b.name);}} style={{ padding:'9px 12px', fontSize:'14px', cursor:'pointer', borderBottom:'1px solid #F2F2F7' }}>{b.name}</div>
                ))}
              </div>
            ) : null;
          })()}
        </div>
      </div>

      <div style={fieldWrap}>
        <div style={S.label}>分类</div>
        <select style={{ ...inputStyle }} value={form.categoryId||''} onChange={e => set('categoryId', e.target.value)}>
          <option value="">不选分类</option>
          {scenes.map(sc => (
            <optgroup key={sc.id} label={sc.iconName + ' ' + sc.name}>
              <option value={sc.id}>{sc.iconName} {sc.name}（场景本身）</option>
              {subs.filter(s => s.parentId === sc.id).map(sub => (
                <option key={sub.id} value={sub.id}>{sub.iconName} {sub.name}</option>
              ))}
            </optgroup>
          ))}
        </select>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px' }}>
        <div>
          <div style={S.label}>购入价格（¥）</div>
          <input style={inputStyle} type="number" min="0" step="0.01" value={form.purchasePrice||''} onChange={e => set('purchasePrice', e.target.value)} placeholder="0.00" />
        </div>
        <div>
          <div style={S.label}>购入日期</div>
          <input style={inputStyle} type="date" value={form.purchaseDate||''} onChange={e => set('purchaseDate', e.target.value)} />
        </div>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px' }}>
        <div>
          <div style={S.label}>数量</div>
          <div style={{ display:'flex', gap:'6px' }}>
            <input style={{ ...inputStyle, flex:'2' }} type="number" min="0" max="9999" value={form.quantity} onChange={e => set('quantity', e.target.value)} />
            <input style={{ ...inputStyle, flex:'1.2', minWidth:0 }} placeholder="单位" value={form.unit||''} onChange={e => set('unit', e.target.value)} />
          </div>
          {/* 单位快捷选择 */}
          {(() => {
            const allUnits = loadUnits();
            const keyword = (form.unit || '').trim();
            const display = keyword
              ? allUnits.filter(u => u.includes(keyword))
              : allUnits;
            if (display.length === 0) return null;
            return (
              <div style={{ display:'flex', flexWrap:'wrap', gap:'4px', marginTop:'6px' }}>
                {display.map(u => (
                  <button key={u} type="button"
                    onMouseDown={e => { e.preventDefault(); set('unit', u); }}
                    style={{ padding:'4px 10px', borderRadius:'12px', border:'1px solid ' + (form.unit===u ? '#007AFF' : '#C7C7CC'), background: form.unit===u ? '#007AFF' : '#fff', color: form.unit===u ? '#fff' : '#3C3C43', fontSize:'13px', cursor:'pointer', fontWeight: form.unit===u ? '600' : '400' }}>
                    {u}
                  </button>
                ))}
              </div>
            );
          })()}
        </div>
        <div>
          <div style={S.label}>状态</div>
          <select style={{ ...inputStyle }} value={form.status} onChange={e => set('status', Number(e.target.value))}>
            <option value={0}>在库</option>
            <option value={1}>出库</option>
          </select>
        </div>
      </div>

      <div style={fieldWrap}>
        <div style={S.label}>评分</div>
        <StarRating value={form.rating||0} onChange={v => set('rating', v)} />
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'14px' }}>
        <div>
          <div style={S.label}>有效期</div>
          <input style={inputStyle} type="date" value={form.expirationDate||''} onChange={e => set('expirationDate', e.target.value)} />
        </div>
        <div>
          <div style={S.label}>提前提醒（天）</div>
          <input style={inputStyle} type="number" min="1" max="365" value={form.notifyDaysBefore||7} onChange={e => set('notifyDaysBefore', Number(e.target.value))} />
        </div>
      </div>

      <div style={fieldWrap}>
        <div style={S.label}>备注</div>
        <textarea style={{ ...inputStyle, height:'72px', resize:'none' }} value={form.notes||''} onChange={e => set('notes', e.target.value)} placeholder="可选" />
      </div>

      {/* 自定义属性 */}
      <div style={{ marginBottom:'16px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px' }}>
          <div style={{ fontSize:'14px', fontWeight:'600', color:'#1C1C1E' }}>自定义属性</div>
          <div style={{ display:'flex', gap:'6px' }}>
            <button style={{ ...S.btnSm('#34C759'), fontSize:'12px', padding:'6px 10px' }} onClick={applyAttrTemplates}>从模板添加</button>
            <button style={S.btnSm()} onClick={addAttr}>+ 添加</button>
          </div>
        </div>
        {attrs.map((a, i) => {
          const tplForKey = getCatAttrTpls(form.categoryId).find(t => t.key.trim() === a.key.trim());
          const opts = tplForKey ? (tplForKey.options || []) : [];
          return (
          <div key={a.id} style={{ marginBottom:'8px' }}>
            <div style={{ display:'flex', gap:'8px' }}>
              <input style={{ ...inputStyle, flex:1 }} placeholder="属性名" value={a.key} onChange={e => updateAttr(i,'key',e.target.value)} />
              <input style={{ ...inputStyle, flex:1 }} placeholder="属性值" value={a.value} onChange={e => updateAttr(i,'value',e.target.value)} />
              <button onClick={() => removeAttr(i)} style={{ color:'#FF3B30', fontSize:'20px', padding:'0 4px', border:'none', background:'none', cursor:'pointer' }}>×</button>
            </div>
            {opts.length > 0 && (
              <div style={{ display:'flex', gap:'4px', flexWrap:'wrap', marginTop:'4px' }}>
                {opts.map(opt => (
                  <button key={opt} type="button" onClick={() => updateAttr(i, 'value', opt)}
                    style={{ padding:'3px 8px', borderRadius:'12px', border:'1px solid #007AFF', background: a.value===opt ? '#007AFF':'#fff', color: a.value===opt ? '#fff':'#007AFF', fontSize:'12px', cursor:'pointer' }}>
                    {opt}
                  </button>
                ))}
              </div>
            )}
          </div>
          );
        })}
      </div>

      {/* 附加物 */}
      {!initial?.parentItemId && (
        <div style={{ marginBottom:'16px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px' }}>
            <div style={{ fontSize:'14px', fontWeight:'600', color:'#1C1C1E' }}>附加物 ({accessories.length})</div>
            <button style={S.btnSm()} onClick={() => setShowAccForm(true)}>+ 添加附加物</button>
          </div>
          {accessories.length > 0 && (
            <div style={{ ...S.card, marginBottom:'8px' }}>
              {accessories.map((acc, i) => (
                <div key={acc.id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 14px', borderBottom: i<accessories.length-1 ? '1px solid rgba(0,0,0,0.06)':'' }}>
                  <div style={{ fontSize:'22px' }}>{acc.iconName||'📦'}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:'14px', fontWeight:'500' }}>{acc.name}</div>
                    {acc.brand && <div style={{ fontSize:'12px', color:'#8E8E93' }}>{acc.brand}</div>}
                  </div>
                  {acc.purchasePrice ? <span style={{ fontSize:'13px', color:'#6C6C70' }}>¥{Number(acc.purchasePrice).toFixed(2)}</span> : null}
                  <button onClick={() => removeAcc(acc.id)} style={{ color:'#FF3B30', fontSize:'18px', border:'none', background:'none', cursor:'pointer', padding:'0 4px' }}>×</button>
                </div>
              ))}
              {/* 附加物小计 */}
              <div style={{ padding:'10px 14px', borderTop:'1px solid rgba(0,0,0,0.08)', background:'#F9F9FB' }}>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:'13px', color:'#6C6C70', marginBottom:'4px' }}>
                  <span>主物品</span>
                  <span>{mainPrice > 0 ? `¥${mainPrice.toFixed(2)}` : '—'}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:'13px', color:'#6C6C70', marginBottom:'4px' }}>
                  <span>附加物小计 ({accessories.length}件)</span>
                  <span>{accTotal > 0 ? `¥${accTotal.toFixed(2)}` : '—'}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:'14px', fontWeight:'700', color:'#1C1C1E', paddingTop:'4px', borderTop:'1px solid rgba(0,0,0,0.06)' }}>
                  <span>总价</span>
                  <span style={{ color:'#007AFF' }}>{grandTotal > 0 ? `¥${grandTotal.toFixed(2)}` : '—'}</span>
                </div>
              </div>
            </div>
          )}
          {showAccForm && (
            <div style={{ background:'#F9F9F9', borderRadius:'12px', padding:'14px', border:'1px solid #E5E5EA', marginBottom:'8px' }}>
              <div style={{ fontSize:'13px', fontWeight:'600', marginBottom:'10px', color:'#6C6C70' }}>新附加物</div>
              <div style={{ display:'flex', gap:'8px', alignItems:'center', marginBottom:'8px' }}>
                <EmojiPicker value={accForm.iconName} onChange={v => setAccForm(f=>({...f, iconName:v}))} />
                <input style={{ ...inputStyle, flex:1 }} placeholder="附加物名称 *" value={accForm.name} onChange={e => setAccForm(f=>({...f, name:e.target.value}))} />
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', marginBottom:'8px' }}>
                <input style={inputStyle} placeholder="品牌（可选）" value={accForm.brand} onChange={e => setAccForm(f=>({...f, brand:e.target.value}))} />
                <input style={inputStyle} type="number" placeholder="价格" value={accForm.purchasePrice} onChange={e => setAccForm(f=>({...f, purchasePrice:e.target.value}))} />
              </div>
              <input style={{ ...inputStyle, marginBottom:'8px' }} type="date" value={accForm.purchaseDate} onChange={e => setAccForm(f=>({...f, purchaseDate:e.target.value}))} />
              <div style={{ display:'flex', gap:'8px' }}>
                <button style={{ ...S.btn(), flex:1, padding:'10px' }} onClick={saveAcc}>确认添加</button>
                <button style={{ ...S.btn('#8E8E93'), flex:1, padding:'10px' }} onClick={() => setShowAccForm(false)}>取消</button>
              </div>
            </div>
          )}
          {/* 总价汇总（无附加物时也显示） */}
          {accessories.length === 0 && mainPrice > 0 && (
            <div style={{ background:'#F0F7FF', borderRadius:'10px', padding:'10px 14px', border:'1px solid #D0E8FF' }}>
              <div style={{ display:'flex', justifyContent:'space-between', fontSize:'14px', fontWeight:'600', color:'#007AFF' }}>
                <span>总价（主物品）</span>
                <span>¥{mainPrice.toFixed(2)}</span>
              </div>
            </div>
          )}
        </div>
      )}

      <button style={S.btn()} onClick={handleSave}>保存</button>
      <button style={{ ...S.btn('#8E8E93'), marginTop:'8px' }} onClick={onClose}>取消</button>
    </div>
  );
}

// ─── Category Form ────────────────────────────────────────────────────────────
function CategoryForm({ initial, parentId, categories, onSave, onClose }) {
  const [name, setName] = useState(initial?.name||'');
  const [icon, setIcon] = useState(initial?.iconName||'📦');
  const [color, setColor] = useState(initial?.colorHex||'#007AFF');

  const handleSave = () => {
    if (!name.trim()) return alert('请输入名称');
    onSave({ name: name.trim(), iconName: icon, colorHex: color, parentId: parentId||null });
  };

  return (
    <div style={{ padding:'16px', paddingBottom:'32px' }}>
      <div style={{ display:'flex', gap:'12px', alignItems:'flex-start', marginBottom:'16px' }}>
        <div>
          <div style={S.label}>图标</div>
          <EmojiPicker value={icon} onChange={setIcon} />
        </div>
        <div style={{ flex:1 }}>
          <div style={S.label}>名称 *</div>
          <input style={S.input} value={name} onChange={e => setName(e.target.value)} placeholder={parentId ? '分类名称' : '场景名称'} />
        </div>
      </div>
      <div style={{ marginBottom:'16px' }}>
        <div style={S.label}>颜色</div>
        <ColorPicker value={color} onChange={setColor} />
      </div>
      <button style={S.btn()} onClick={handleSave}>保存</button>
      <button style={{ ...S.btn('#8E8E93'), marginTop:'8px' }} onClick={onClose}>取消</button>
    </div>
  );
}

// ─── Item Detail Sheet ────────────────────────────────────────────────────────
function ItemDetailSheet({ item, store, onClose, onEdit, onDelete, onRecordUse, onUpdateQty }) {
  if (!item) return null;
  const cat = store.categories.find(c => c.id === item.categoryId);
  const scene = cat?.parentId ? store.categories.find(c => c.id === cat.parentId) : cat;
  const attrs = store.itemAttributes.filter(a => a.itemId === item.id).sort((a,b)=>a.sortOrder-b.sortOrder);
  // Accessories (saved as child items)
  const attachmentItems = store.items.filter(i => i.parentItemId === item.id);
  const stockRecords = store.stockRecords.filter(r => r.itemId === item.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const usageRecords = store.usageRecords.filter(r => r.itemId === item.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const expStatus = expiryStatus(item.expirationDate);

  const price = Number(item.purchasePrice)||0;
  const accTotal = attachmentItems.reduce((s, a) => s + (Number(a.purchasePrice) || 0), 0);
  const totalPrice = price + accTotal;
  const cpw = item.timesUsed > 0 && price > 0 ? (price / item.timesUsed).toFixed(2) : null;
  const daysUsed = item.firstUsedAt ? Math.max(1, daysBetween(item.firstUsedAt, today())+1) : null;
  const cpd = daysUsed && price > 0 ? (price / daysUsed).toFixed(2) : null;

  const Section = ({ title, children }) => (
    <div style={{ marginBottom:'12px' }}>
      <div style={S.sectionHeader}>{title}</div>
      <div style={S.card}>{children}</div>
    </div>
  );
  const InfoRow = ({ label, value, last }) => (
    <div style={{ display:'flex', justifyContent:'space-between', padding:'11px 16px', borderBottom: last ? 'none' : '1px solid rgba(0,0,0,0.06)', alignItems:'center' }}>
      <span style={{ fontSize:'15px', color:'#6C6C70' }}>{label}</span>
      <span style={{ fontSize:'15px', fontWeight:'500' }}>{value || '—'}</span>
    </div>
  );

  return (
    <div style={{ padding:'16px', paddingBottom:'32px' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:'14px', marginBottom:'16px' }}>
        <div style={{ ...S.emojiBox(item.colorHex||cat?.colorHex||'#007AFF'), width:'60px', height:'60px', borderRadius:'14px', fontSize:'30px' }}>
          {item.iconName||'📦'}
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:'20px', fontWeight:'700' }}>{item.name}</div>
          {item.brand && <div style={{ fontSize:'14px', color:'#6C6C70', marginTop:'2px' }}>{item.brand}</div>}
          {cat && <div style={{ fontSize:'13px', color:'#007AFF', marginTop:'4px' }}>{scene?.iconName||''} {cat.name}</div>}
        </div>
        <div style={{ display:'flex', gap:'8px' }}>
          <button onClick={onEdit} style={S.btnSm()}>编辑</button>
          <button onClick={onDelete} style={S.btnSm('#FF3B30')}>删除</button>
        </div>
      </div>

      {/* 数量控制 */}
      <div style={{ ...S.card, padding:'12px 16px', marginBottom:'12px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:'15px' }}>数量</span>
        <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
          <button onClick={() => onUpdateQty(item, -1)} style={{ width:'32px', height:'32px', borderRadius:'50%', background:'#E5E5EA', border:'none', fontSize:'20px', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>−</button>
          <span style={{ fontSize:'20px', fontWeight:'600', minWidth:'32px', textAlign:'center' }}>{item.quantity||0}{item.unit ? <span style={{ fontSize:'13px', color:'#8E8E93', marginLeft:'2px' }}>{item.unit}</span> : null}</span>
          <button onClick={() => onUpdateQty(item, 1)} style={{ width:'32px', height:'32px', borderRadius:'50%', background:'#007AFF', border:'none', fontSize:'20px', color:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>+</button>
        </div>
        <button style={S.btnSm()} onClick={() => onRecordUse(item)}>记录一次</button>
      </div>

      <Section title="基础信息">
        <InfoRow label="状态" value={item.status===1 ? '出库':'在库'} />
        <InfoRow label="评分" value={item.rating ? '⭐'.repeat(item.rating) : '未评分'} />
        {item.purchaseDate && <InfoRow label="购入日期" value={fmt(item.purchaseDate)} />}
        {item.expirationDate && <InfoRow label="有效期" value={
          <span style={{ display:'flex', alignItems:'center', gap:'6px' }}>
            {fmt(item.expirationDate)}
            {expStatus && <span style={S.tag(expStatus.color)}>{expStatus.label}</span>}
          </span>
        } />}
        {item.notes && <div style={{ padding:'11px 16px', fontSize:'14px', color:'#6C6C70' }}>{item.notes}</div>}
      </Section>

      <Section title="财务">
        <InfoRow label="购入价格" value={fmtPrice(item.purchasePrice)} />
        {attachmentItems.length > 0 && (
          <InfoRow label="附加物合计" value={accTotal > 0 ? `¥${accTotal.toFixed(2)}` : '—'} />
        )}
        <InfoRow label={attachmentItems.length > 0 ? '总价（含附件）' : '总价'} value={totalPrice > 0 ? `¥${totalPrice.toFixed(2)}` : '—'} />
        <InfoRow label="每次成本 CPW" value={cpw ? `¥${cpw}` : '—'} />
        <InfoRow label="每日成本 CPD" value={cpd ? `¥${cpd}` : '—'} last />
      </Section>

      <Section title="使用统计">
        <InfoRow label="使用次数" value={`${(item.timesUsed||0) + attachmentItems.reduce((s,a)=>s+(a.timesUsed||0),0)} 次${attachmentItems.length > 0 ? ` (主${item.timesUsed||0}+附${attachmentItems.reduce((s,a)=>s+(a.timesUsed||0),0)})` : ''}`} />
        <InfoRow label="首次使用" value={fmt(item.firstUsedAt)} />
        <InfoRow label="最近使用" value={fmt(item.lastUsedAt)} />
        <InfoRow label="使用天数" value={daysUsed ? `${daysUsed} 天` : '—'} last />
      </Section>

      {attrs.length > 0 && (
        <Section title="自定义属性">
          {attrs.map((a, i) => (
            <InfoRow key={a.id} label={a.key} value={a.value} last={i===attrs.length-1} />
          ))}
        </Section>
      )}

      {attachmentItems.length > 0 && (
        <Section title={`附加物 (${attachmentItems.length})`}>
          {attachmentItems.map((att, i) => (
            <div key={att.id} style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 16px', borderBottom: i<attachmentItems.length-1 ? '1px solid rgba(0,0,0,0.06)':'' }}>
              <div style={S.emojiBox(att.colorHex||'#007AFF')}>{att.iconName||'📦'}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:'15px' }}>{att.name}</div>
                {att.brand && <div style={{ fontSize:'13px', color:'#8E8E93' }}>{att.brand}</div>}
              </div>
              {att.purchasePrice && <span style={{ fontSize:'14px', color:'#6C6C70', fontWeight:'600' }}>{fmtPrice(att.purchasePrice)}</span>}
              <button onClick={() => onRecordUse(att)} style={{ padding:'4px 8px', borderRadius:'8px', background:'#007AFF', color:'#fff', fontSize:'12px', border:'none', cursor:'pointer', flexShrink:0 }}>✓记录</button>
            </div>
          ))}
          {accTotal > 0 && (
            <div style={{ padding:'10px 16px', background:'#F9F9FB', borderTop:'1px solid rgba(0,0,0,0.06)', display:'flex', justifyContent:'space-between' }}>
              <span style={{ fontSize:'13px', color:'#6C6C70' }}>附加物小计</span>
              <span style={{ fontSize:'13px', fontWeight:'700', color:'#007AFF' }}>¥{accTotal.toFixed(2)}</span>
            </div>
          )}
        </Section>
      )}

      {usageRecords.length > 0 && (
        <Section title={`最近使用记录`}>
          {usageRecords.slice(0, 5).map((r, i) => (
            <div key={r.id} style={{ display:'flex', justifyContent:'space-between', padding:'10px 16px', borderBottom: i < Math.min(4, usageRecords.length-1) ? '1px solid rgba(0,0,0,0.06)':'' }}>
              <span style={{ fontSize:'14px', color:'#6C6C70' }}>{fmt(r.date)}</span>
              {r.notes && <span style={{ fontSize:'14px' }}>{r.notes}</span>}
            </div>
          ))}
          {usageRecords.length > 5 && (
            <div style={{ padding:'8px 16px', fontSize:'13px', color:'#8E8E93', textAlign:'center' }}>共 {usageRecords.length} 条记录</div>
          )}
        </Section>
      )}

      {stockRecords.length > 0 && (
        <Section title={`库存记录 (${stockRecords.length})`}>
          {stockRecords.slice(0, 10).map((r, i) => (
            <div key={r.id} style={{ display:'flex', justifyContent:'space-between', padding:'10px 16px', borderBottom: i < Math.min(9, stockRecords.length-1) ? '1px solid rgba(0,0,0,0.06)':'' }}>
              <span style={{ fontSize:'14px', color: r.type===0?'#34C759':'#FF3B30' }}>{r.type===0?'入库':'出库'} {r.quantity}</span>
              <span style={{ fontSize:'14px', color:'#6C6C70' }}>{fmt(r.date)}</span>
            </div>
          ))}
        </Section>
      )}
    </div>
  );
}

// ─── Item Row Component ───────────────────────────────────────────────────────
function ItemRow({ item, categories, allItems, onTap, onRecordUse, onUpdateQty, isLast, sortBy }) {
  const cat = categories.find(c => c.id === item.categoryId);
  const expStatus = expiryStatus(item.expirationDate);
  // 计算含附件的总价
  const mainPrice = Number(item.purchasePrice)||0;
  const accTotal = (allItems||[]).filter(i => i.parentItemId === item.id).reduce((s,a) => s+(Number(a.purchasePrice)||0), 0);
  const displayPrice = mainPrice + accTotal;
  // 计算排序相关字段
  const cpwVal = (item.timesUsed||0) > 0 ? (mainPrice / item.timesUsed).toFixed(2) : null;
  const refDate = item.purchaseDate || item.createdAt || today();
  const daysElapsed = Math.max(1, daysBetween(refDate.slice(0,10), today()));
  const cpdVal = mainPrice > 0 ? (mainPrice / daysElapsed).toFixed(2) : null;
  const rowStyle = { ...S.row, ...(isLast ? S.rowLast : {}), gap:'10px', padding:'10px 12px' };
  // 额外信息行
  let extraInfo = null;
  if (sortBy === 'timesUsed') {
    extraInfo = <span style={{ color:'#007AFF', fontSize:'11px', fontWeight:'500' }}>使用 {item.timesUsed||0} 次</span>;
  } else if (sortBy === 'rating' && (item.rating||0) > 0) {
    extraInfo = <span style={{ color:'#FF9500', fontSize:'11px' }}>{'★'.repeat(item.rating||0)}</span>;
  } else if (sortBy === 'cpw') {
    extraInfo = <span style={{ color:'#5856D6', fontSize:'11px', fontWeight:'500' }}>CPW: {cpwVal ? `¥${cpwVal}/次` : '—'}</span>;
  } else if (sortBy === 'dailyCost') {
    extraInfo = <span style={{ color:'#34C759', fontSize:'11px', fontWeight:'500' }}>CPD: {cpdVal ? `¥${cpdVal}/天` : '—'}</span>;
  }
  return (
    <div style={rowStyle}>
      {/* 左侧：点击进详情 */}
      <div style={{ display:'flex', alignItems:'center', gap:'10px', flex:1, minWidth:0 }} onClick={onTap}>
        <div style={S.emojiBox(item.colorHex||cat?.colorHex||'#007AFF')}>
          {item.iconName||'📦'}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:'15px', fontWeight:'500', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.name}</div>
          <div style={{ fontSize:'12px', color:'#8E8E93', marginTop:'2px', display:'flex', gap:'4px', alignItems:'center', flexWrap:'wrap' }}>
            {item.brand && <span>{item.brand}</span>}
            {item.brand && cat && <span>·</span>}
            {cat && <span>{cat.iconName} {cat.name}</span>}
            {expStatus && expStatus.level < 3 && <span style={{ color: expStatus.color, fontWeight:'500' }}>{expStatus.label}</span>}
            {item.status === 1 && <span style={{ color:'#8E8E93' }}>出库</span>}
          </div>
          {extraInfo && <div style={{ marginTop:'3px' }}>{extraInfo}</div>}
        </div>
        <div style={{ flexShrink:0, textAlign:'right' }}>
          {displayPrice > 0 && <div style={{ fontSize:'14px', fontWeight:'600', color:'#1C1C1E' }}>{fmtPrice(displayPrice)}{accTotal>0 && <span style={{fontSize:'10px',color:'#8E8E93',marginLeft:'2px'}}>含附件</span>}</div>}
        </div>
      </div>
      {/* 右侧快捷操作：增减数量 + 记录使用 */}
      <div style={{ display:'flex', alignItems:'center', gap:'4px', flexShrink:0 }}>
        <button onClick={e=>{e.stopPropagation();onUpdateQty(item,-1);}} style={{ width:'28px',height:'28px',borderRadius:'50%',background:'#FF9500',border:'none',color:'#fff',fontSize:'16px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1 }}>−</button>
        <span style={{ fontSize:'13px',color:'#444',minWidth:'18px',textAlign:'center',fontWeight:'500' }}>{item.quantity||0}{item.unit ? <span style={{fontSize:'11px',color:'#8E8E93',marginLeft:'1px'}}>{item.unit}</span> : null}</span>
        <button onClick={e=>{e.stopPropagation();onUpdateQty(item,1);}} style={{ width:'28px',height:'28px',borderRadius:'50%',background:'#34C759',border:'none',color:'#fff',fontSize:'16px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1 }}>+</button>
        <button onClick={e=>{e.stopPropagation();onRecordUse(item);}} style={{ width:'28px',height:'28px',borderRadius:'50%',background:'#007AFF',border:'none',color:'#fff',fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1 }} title="记录使用">✓</button>
      </div>
    </div>
  );
}

// ─── HOME TAB ─────────────────────────────────────────────────────────────────
function HomeTab({ store, dispatch, onNavigateToItems }) {
  const [expandedScenes, setExpandedScenes] = useState({});
  const [showCatForm, setShowCatForm] = useState(false);
  const [editingCat, setEditingCat] = useState(null);
  const [addSubParent, setAddSubParent] = useState(null);
  const [selectedCat, setSelectedCat] = useState(null);
  const [showItemList, setShowItemList] = useState(false);
  const [showItemForm, setShowItemForm] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  // Scene manage mode
  const [manageMode, setManageMode] = useState(false);
  const [manageSubTab, setManageSubTab] = useState('sort'); // 'sort' | 'cats'
  const [expandedManageScenes, setExpandedManageScenes] = useState({});

  const scenes = store.categories.filter(c => !c.parentId).sort((a,b)=>a.sortOrder-b.sortOrder);
  const inStockItems = store.items.filter(i => !i.parentItemId && i.status === 0);
  const totalAsset = store.items.reduce((s,i) => s + (Number(i.purchasePrice)||0) * (i.quantity||1), 0);
  const sceneCount = scenes.length;
  const subCatCount = store.categories.filter(c => c.parentId).length;

  const toggleScene = (id) => setExpandedScenes(e => ({ ...e, [id]: !e[id] }));

  const openItemList = (catId) => { setSelectedCat(catId); setShowItemList(true); };

  const getItemsForCat = (catId) => {
    const cat = store.categories.find(c => c.id === catId);
    if (!cat) return [];
    if (!cat.parentId) {
      const subIds = store.categories.filter(c => c.parentId === catId).map(c => c.id);
      return store.items.filter(i => !i.parentItemId && (i.categoryId === catId || subIds.includes(i.categoryId)));
    }
    return store.items.filter(i => !i.parentItemId && i.categoryId === catId);
  };

  const getCatTotalValue = (catId) => {
    return getItemsForCat(catId).reduce((s, i) => s + (Number(i.purchasePrice)||0) * (i.quantity||1), 0);
  };

  const handleSaveCat = (data) => {
    if (editingCat) {
      dispatch({ type: 'UPDATE_CAT', payload: { ...editingCat, ...data } });
    } else {
      const siblings = store.categories.filter(c => c.parentId === (addSubParent||null));
      dispatch({ type: 'ADD_CAT', payload: { id: genId(), sortOrder: siblings.length, createdAt: now(), ...data, parentId: addSubParent||null } });
    }
    setShowCatForm(false); setEditingCat(null); setAddSubParent(null);
  };

  const handleDeleteCat = (cat) => {
    if (!window.confirm(`确认删除"${cat.name}"？`)) return;
    dispatch({ type: 'DELETE_CAT', payload: cat.id });
  };

  const handleSaveItem = (formData, attrs, accessories) => {
    if (editingItem) {
      dispatch({ type: 'UPDATE_ITEM', payload: { ...editingItem, ...formData, updatedAt: now() }, attrs, accessories });
    } else {
      dispatch({ type: 'ADD_ITEM', payload: { id: genId(), timesUsed:0, firstUsedAt:null, lastUsedAt:null, createdAt:now(), updatedAt:now(), ...formData }, attrs, accessories });
    }
    setShowItemForm(false); setEditingItem(null);
  };

  const handleRecordUse = (item) => dispatch({ type: 'RECORD_USE', payload: item });
  const handleUpdateQty = (item, delta) => dispatch({ type: 'UPDATE_QTY', payload: { item, delta } });

  // Scene sort operations
  const moveScene = (scene, dir) => {
    const sorted = [...scenes];
    const idx = sorted.findIndex(s => s.id === scene.id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= sorted.length) return;
    const updated = sorted.map((s, i) => {
      if (i === idx) return { ...s, sortOrder: newIdx };
      if (i === newIdx) return { ...s, sortOrder: idx };
      return s;
    });
    updated.forEach(s => dispatch({ type: 'UPDATE_CAT', payload: s }));
  };

  // Sub-cat sort
  const moveSubCat = (sub, dir, parentId) => {
    const subs = store.categories.filter(c => c.parentId === parentId).sort((a,b)=>a.sortOrder-b.sortOrder);
    const idx = subs.findIndex(s => s.id === sub.id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= subs.length) return;
    subs.forEach((s, i) => {
      let newOrder = i;
      if (i === idx) newOrder = newIdx;
      else if (i === newIdx) newOrder = idx;
      dispatch({ type: 'UPDATE_CAT', payload: { ...s, sortOrder: newOrder } });
    });
  };

  const catItems = selectedCat ? getItemsForCat(selectedCat) : [];

  return (
    <div style={S.screen}>
      {/* Hero Card */}
      <div style={S.hero}>
        <div style={{ fontSize:'13px', opacity:0.8, marginBottom:'10px', fontWeight:'500' }}>StuffBox 资产总览</div>
        <div style={{ fontSize:'30px', fontWeight:'700', marginBottom:'12px' }}>¥{totalAsset.toFixed(2)}</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'0', marginTop:'4px' }}>
          <div style={{ textAlign:'center', padding:'0 4px' }}>
            <div style={{ fontSize:'20px', fontWeight:'700' }}>{inStockItems.length}</div>
            <div style={{ fontSize:'11px', opacity:0.75, marginTop:'2px' }}>在库物品</div>
          </div>
          <div style={{ width:'1px', background:'rgba(255,255,255,0.3)', alignSelf:'stretch' }} />
          <div style={{ textAlign:'center', padding:'0 4px' }}>
            <div style={{ fontSize:'20px', fontWeight:'700' }}>{sceneCount}</div>
            <div style={{ fontSize:'11px', opacity:0.75, marginTop:'2px' }}>场景</div>
          </div>
          <div style={{ textAlign:'center', padding:'0 4px' }}>
            <div style={{ fontSize:'20px', fontWeight:'700' }}>{subCatCount}</div>
            <div style={{ fontSize:'11px', opacity:0.75, marginTop:'2px' }}>分类</div>
          </div>
        </div>
      </div>

      {/* Scenes Section */}
      <div style={{ padding:'0 16px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px' }}>
          <div style={S.sectionHeader}>场景</div>
          <div style={{ display:'flex', gap:'6px' }}>
            <button style={{ ...S.btnSm(manageMode ? '#FF9500' : '#E5E5EA'), color: manageMode ? '#fff' : '#333', fontSize:'12px', padding:'6px 10px' }} onClick={() => setManageMode(!manageMode)}>
              {manageMode ? '完成' : '管理'}
            </button>
            {!manageMode && (
              <button style={S.btnSm()} onClick={() => { setEditingCat(null); setAddSubParent(null); setShowCatForm(true); }}>+ 场景</button>
            )}
          </div>
        </div>

        {/* Manage Sub-Tabs */}
        {manageMode && (
          <div style={{ display:'flex', gap:'6px', marginBottom:'12px', background:'#E5E5EA', borderRadius:'10px', padding:'3px' }}>
            <button onClick={() => setManageSubTab('sort')} style={{ flex:1, padding:'7px', borderRadius:'8px', border:'none', background: manageSubTab==='sort' ? '#fff' : 'transparent', color: manageSubTab==='sort' ? '#007AFF' : '#6C6C70', fontSize:'13px', fontWeight: manageSubTab==='sort' ? '600' : '400', cursor:'pointer', boxShadow: manageSubTab==='sort' ? '0 1px 3px rgba(0,0,0,0.12)' : 'none' }}>
              场景排序
            </button>
            <button onClick={() => setManageSubTab('cats')} style={{ flex:1, padding:'7px', borderRadius:'8px', border:'none', background: manageSubTab==='cats' ? '#fff' : 'transparent', color: manageSubTab==='cats' ? '#007AFF' : '#6C6C70', fontSize:'13px', fontWeight: manageSubTab==='cats' ? '600' : '400', cursor:'pointer', boxShadow: manageSubTab==='cats' ? '0 1px 3px rgba(0,0,0,0.12)' : 'none' }}>
              分类管理
            </button>
          </div>
        )}

        {/* Scene Sort Mode */}
        {manageMode && manageSubTab === 'sort' && (
          <div>
            {scenes.length === 0 && (
              <div style={{ ...S.card, padding:'24px', textAlign:'center', color:'#8E8E93' }}>没有场景</div>
            )}
            {scenes.map((scene, idx) => {
              const sceneItemCount = getItemsForCat(scene.id).length;
              const sceneTotalValue = getCatTotalValue(scene.id);
              return (
                <div key={scene.id} style={{ ...S.card, marginBottom:'8px', display:'flex', alignItems:'center', padding:'12px 16px', gap:'12px' }}>
                  <div style={S.emojiBox(scene.colorHex)}>{scene.iconName||'🏠'}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:'15px', fontWeight:'600' }}>{scene.name}</div>
                    <div style={{ fontSize:'12px', color:'#8E8E93' }}>{sceneItemCount}件 · ¥{sceneTotalValue.toFixed(2)}</div>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:'2px' }}>
                    <button disabled={idx===0} onClick={() => moveScene(scene, -1)} style={{ background: idx===0?'#F2F2F7':'#E5E5EA', border:'none', borderRadius:'6px', width:'30px', height:'26px', fontSize:'14px', cursor: idx===0?'default':'pointer', color: idx===0?'#C7C7CC':'#333', display:'flex', alignItems:'center', justifyContent:'center' }}>↑</button>
                    <button disabled={idx===scenes.length-1} onClick={() => moveScene(scene, 1)} style={{ background: idx===scenes.length-1?'#F2F2F7':'#E5E5EA', border:'none', borderRadius:'6px', width:'30px', height:'26px', fontSize:'14px', cursor: idx===scenes.length-1?'default':'pointer', color: idx===scenes.length-1?'#C7C7CC':'#333', display:'flex', alignItems:'center', justifyContent:'center' }}>↓</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Category Management Mode */}
        {manageMode && manageSubTab === 'cats' && (
          <div>
            {scenes.length === 0 && (
              <div style={{ ...S.card, padding:'24px', textAlign:'center', color:'#8E8E93' }}>没有场景，请先添加场景</div>
            )}
            {scenes.map(scene => {
              const subCats = store.categories.filter(c => c.parentId === scene.id).sort((a,b)=>a.sortOrder-b.sortOrder);
              const expandedM = expandedManageScenes[scene.id];
              const sceneTotalValue = getCatTotalValue(scene.id);
              const sceneItemCount = getItemsForCat(scene.id).length;
              return (
                <div key={scene.id} style={{ ...S.card, marginBottom:'10px' }}>
                  <div style={{ display:'flex', alignItems:'center', padding:'12px 16px', cursor:'pointer', gap:'10px' }} onClick={() => setExpandedManageScenes(e => ({...e, [scene.id]: !e[scene.id]}))}>
                    <div style={S.emojiBox(scene.colorHex)}>{scene.iconName||'🏠'}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:'15px', fontWeight:'600' }}>{scene.name}</div>
                      <div style={{ fontSize:'12px', color:'#8E8E93' }}>{sceneItemCount}件 · ¥{sceneTotalValue.toFixed(2)} · {subCats.length}个分类</div>
                    </div>
                    <span style={{ color:'#C7C7CC', fontSize:'14px', transform: expandedM ? 'rotate(90deg)':'rotate(0deg)', transition:'0.2s' }}>›</span>
                  </div>
                  {expandedM && (
                    <div style={{ borderTop:'1px solid rgba(0,0,0,0.06)' }}>
                      {subCats.map((sub, si) => {
                        const subCount = store.items.filter(i => !i.parentItemId && i.categoryId === sub.id).length;
                        const subValue = store.items.filter(i => !i.parentItemId && i.categoryId === sub.id).reduce((s,i)=>s+(Number(i.purchasePrice)||0)*(i.quantity||1),0);
                        return (
                          <div key={sub.id} style={{ display:'flex', alignItems:'center', padding:'10px 16px 10px 28px', borderBottom:'1px solid rgba(0,0,0,0.04)', gap:'10px' }}>
                            <div style={{ ...S.emojiBox(sub.colorHex), width:'32px', height:'32px', fontSize:'16px' }}>{sub.iconName||'📁'}</div>
                            <div style={{ flex:1 }}>
                              <div style={{ fontSize:'14px', fontWeight:'500' }}>{sub.name}</div>
                              <div style={{ fontSize:'12px', color:'#8E8E93' }}>{subCount}件 · ¥{subValue.toFixed(2)}</div>
                            </div>
                            <div style={{ display:'flex', gap:'4px', alignItems:'center' }}>
                              <button onClick={() => { setEditingCat(sub); setAddSubParent(scene.id); setShowCatForm(true); }} style={{ ...S.btnSm('#E5E5EA'), color:'#333', padding:'4px 8px', fontSize:'11px' }}>编辑</button>
                              <div style={{ display:'flex', flexDirection:'column', gap:'2px' }}>
                                <button disabled={si===0} onClick={() => moveSubCat(sub, -1, scene.id)} style={{ background: si===0?'transparent':'#E5E5EA', border:'none', borderRadius:'4px', width:'24px', height:'20px', fontSize:'11px', cursor: si===0?'default':'pointer', color: si===0?'#C7C7CC':'#333', display:'flex', alignItems:'center', justifyContent:'center' }}>↑</button>
                                <button disabled={si===subCats.length-1} onClick={() => moveSubCat(sub, 1, scene.id)} style={{ background: si===subCats.length-1?'transparent':'#E5E5EA', border:'none', borderRadius:'4px', width:'24px', height:'20px', fontSize:'11px', cursor: si===subCats.length-1?'default':'pointer', color: si===subCats.length-1?'#C7C7CC':'#333', display:'flex', alignItems:'center', justifyContent:'center' }}>↓</button>
                              </div>
                              <button onClick={() => handleDeleteCat(sub)} style={{ color:'#FF3B30', fontSize:'18px', border:'none', background:'none', cursor:'pointer', padding:'0 2px' }}>×</button>
                            </div>
                          </div>
                        );
                      })}
                      <button onClick={() => { setAddSubParent(scene.id); setEditingCat(null); setShowCatForm(true); }}
                              style={{ width:'100%', padding:'10px 16px 10px 28px', textAlign:'left', color:'#007AFF', fontSize:'14px', background:'none', border:'none', cursor:'pointer' }}>
