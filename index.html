                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Normal Scene Cards */}
        {!manageMode && (
          <>
            {scenes.length === 0 && (
              <div style={{ ...S.card, padding:'32px', textAlign:'center', color:'#8E8E93' }}>
                还没有场景，点击"+ 场景"开始吧
              </div>
            )}
            {scenes.map(scene => {
              const subCats = store.categories.filter(c => c.parentId === scene.id).sort((a,b)=>a.sortOrder-b.sortOrder);
              const sceneItemCount = getItemsForCat(scene.id).length;
              const sceneTotalValue = getCatTotalValue(scene.id);
              const expanded = expandedScenes[scene.id];
              return (
                <div key={scene.id} style={{ ...S.card, marginBottom:'10px' }}>
                  {/* Scene Header */}
                  <div style={{ display:'flex', alignItems:'center', padding:'12px 16px', cursor:'pointer' }} onClick={() => toggleScene(scene.id)}>
                    <div style={{ ...S.emojiBox(scene.colorHex), marginRight:'12px' }}>{scene.iconName||'🏠'}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:'15px', fontWeight:'600' }}>{scene.name}</div>
                      <div style={{ fontSize:'13px', color:'#8E8E93' }}>{sceneItemCount} 件 · ¥{sceneTotalValue.toFixed(2)} · {subCats.length} 个分类</div>
                    </div>
                    <div style={{ display:'flex', gap:'6px', alignItems:'center' }}>
                      <button onClick={e => { e.stopPropagation(); setEditingCat(scene); setAddSubParent(null); setShowCatForm(true); }} style={{ ...S.btnSm('#E5E5EA'), color:'#333', padding:'5px 10px', fontSize:'12px' }}>编辑</button>
                      <button onClick={e => { e.stopPropagation(); handleDeleteCat(scene); }} style={{ color:'#FF3B30', fontSize:'18px', padding:'0 4px', border:'none', background:'none', cursor:'pointer' }}>×</button>
                      <span style={{ color:'#C7C7CC', fontSize:'14px', transform: expanded ? 'rotate(90deg)':'rotate(0deg)', transition:'0.2s' }}>›</span>
                    </div>
                  </div>

                  {/* Sub-categories (expanded) */}
                  {expanded && (
                    <div style={{ borderTop:'1px solid rgba(0,0,0,0.06)' }}>
                      {subCats.map((sub, i) => {
                        const subCount = store.items.filter(item => !item.parentItemId && item.categoryId === sub.id).length;
                        const subValue = store.items.filter(item => !item.parentItemId && item.categoryId === sub.id).reduce((s,i)=>s+(Number(i.purchasePrice)||0)*(i.quantity||1),0);
                        return (
                          <div key={sub.id} style={{ display:'flex', alignItems:'center', padding:'10px 16px 10px 28px', borderBottom: i<subCats.length ? '1px solid rgba(0,0,0,0.04)':'', cursor:'pointer' }} onClick={() => openItemList(sub.id)}>
                            <div style={{ ...S.emojiBox(sub.colorHex), width:'32px', height:'32px', fontSize:'16px', marginRight:'10px' }}>{sub.iconName||'📁'}</div>
                            <div style={{ flex:1 }}>
                              <div style={{ fontSize:'14px', fontWeight:'500' }}>{sub.name}</div>
                              <div style={{ fontSize:'12px', color:'#8E8E93' }}>{subCount} 件 · ¥{subValue.toFixed(2)}</div>
                            </div>
                            <span style={S.chevron}>›</span>
                          </div>
                        );
                      })}
                      {/* View all button */}
                      <button onClick={() => openItemList(scene.id)}
                              style={{ width:'100%', padding:'11px 16px', textAlign:'center', color:'#007AFF', fontSize:'14px', fontWeight:'600', background:'#F0F7FF', border:'none', cursor:'pointer', borderTop: subCats.length > 0 ? '1px solid rgba(0,0,0,0.04)':'' }}>
                        查看全部 {sceneItemCount} 件 →
                      </button>
                    </div>
                  )}

                  {/* When not expanded, show quick actions */}
                  {!expanded && (
                    <div style={{ borderTop:'1px solid rgba(0,0,0,0.06)', padding:'10px 16px', display:'flex', justifyContent:'flex-end' }}>
                      <button onClick={() => openItemList(scene.id)} style={{ ...S.btnSm(), padding:'6px 12px', fontSize:'12px' }}>
                        查看全部 {sceneItemCount} 件
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </>
        )}
      </div>

      {/* Category Form Sheet */}
      <Sheet open={showCatForm} onClose={() => { setShowCatForm(false); setEditingCat(null); setAddSubParent(null); }} title={editingCat ? '编辑' : (addSubParent ? '添加分类' : '添加场景')}>
        <CategoryForm initial={editingCat} parentId={addSubParent} categories={store.categories} onSave={handleSaveCat} onClose={() => { setShowCatForm(false); setEditingCat(null); setAddSubParent(null); }} />
      </Sheet>

      {/* Item List Sheet */}
      <Sheet open={showItemList} onClose={() => setShowItemList(false)} title={selectedCat ? (store.categories.find(c=>c.id===selectedCat)?.name||'物品列表') : '物品列表'}>
        <div style={{ padding:'8px 16px 8px' }}>
          <button style={S.btn()} onClick={() => { setEditingItem(null); setShowItemForm(true); }}>+ 添加物品</button>
        </div>
        <div style={{ padding:'0 16px 20px' }}>
          {catItems.length === 0 ? (
            <div style={{ textAlign:'center', color:'#8E8E93', padding:'32px' }}>还没有物品</div>
          ) : (
            <div style={S.card}>
              {catItems.map((item, i) => (
                <ItemRow key={item.id} item={item} categories={store.categories} allItems={store.items} isLast={i===catItems.length-1}
                  onTap={() => { setDetailItem(item); }}
                  onRecordUse={handleRecordUse}
                  onUpdateQty={(item,delta) => dispatch({ type:'UPDATE_QTY', payload:{ item, delta } })} />
              ))}
            </div>
          )}
        </div>
      </Sheet>

      {/* Item Form Sheet */}
      <Sheet open={showItemForm} onClose={() => { setShowItemForm(false); setEditingItem(null); }} title={editingItem ? '编辑物品' : '添加物品'}>
        <ItemForm initial={editingItem ? { ...editingItem, _attrs: store.itemAttributes.filter(a=>a.itemId===editingItem.id), _accessories: store.items.filter(i=>i.parentItemId===editingItem.id) } : { categoryId: selectedCat||'' }}
          categories={store.categories} allItems={store.items} onSave={handleSaveItem} onClose={() => { setShowItemForm(false); setEditingItem(null); }} />
      </Sheet>

      {/* Item Detail Sheet */}
      <Sheet open={!!detailItem} onClose={() => setDetailItem(null)} title="物品详情">
        <ItemDetailSheet item={detailItem} store={store}
          onClose={() => setDetailItem(null)}
          onEdit={() => { setEditingItem(detailItem); setDetailItem(null); setShowItemForm(true); }}
          onDelete={() => { if(window.confirm('确认删除?')) { dispatch({type:'DELETE_ITEM', payload: detailItem.id}); setDetailItem(null); }}}
          onRecordUse={handleRecordUse}
          onUpdateQty={handleUpdateQty} />
      </Sheet>
    </div>
  );
}

// ─── ITEMS TAB ────────────────────────────────────────────────────────────────
function ItemsTab({ store, dispatch, sortByExternal, onSortByChange }) {
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterSubCat, setFilterSubCat] = useState('');
  const sortBy = sortByExternal || 'createdAt';
  const setSortBy = onSortByChange || (() => {});
  const [showSort, setShowSort] = useState(false);
  const [showFilter, setShowFilter] = useState(false);
  const [showItemForm, setShowItemForm] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const [detailItem, setDetailItem] = useState(null);
  const [filterStatus, setFilterStatus] = useState('in');
  const [filterRating, setFilterRating] = useState(0);
  const [filterPriceMin, setFilterPriceMin] = useState('');
  const [filterPriceMax, setFilterPriceMax] = useState('');
  const [filterExpiry, setFilterExpiry] = useState('all'); // all | hasExpiry | expiringSoon | expired
  const [filterBrand, setFilterBrand] = useState('');
  const [filterAttrKey, setFilterAttrKey] = useState('');
  const [filterAttrValue, setFilterAttrValue] = useState('');
  const [filterExpiryDays, setFilterExpiryDays] = useState('');

  const scenes = store.categories.filter(c => !c.parentId).sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
  const subs = store.categories.filter(c => c.parentId).sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
  const hasAdvFilter = filterStatus !== 'in' || filterRating > 0 || filterPriceMin !== '' || filterPriceMax !== '' || filterExpiry !== 'all' || filterBrand !== '' || filterAttrKey !== '' || filterExpiryDays !== '';
  const setScene = (id) => { setFilterCat(id); setFilterSubCat(''); };
  const effectiveCatFilter = filterSubCat || filterCat;

  const allItems = useMemo(() => {
    let items = store.items.filter(i => !i.parentItemId);
    if (search.trim()) {
      const q = search.toLowerCase();
      items = items.filter(i => i.name.toLowerCase().includes(q) || (i.brand||'').toLowerCase().includes(q) || (i.notes||'').toLowerCase().includes(q));
    }
    if (effectiveCatFilter) {
      const cat = store.categories.find(c => c.id === effectiveCatFilter);
      if (cat && !cat.parentId) {
        const subIds = store.categories.filter(c => c.parentId === effectiveCatFilter).map(c => c.id);
        items = items.filter(i => i.categoryId === effectiveCatFilter || subIds.includes(i.categoryId));
      } else {
        items = items.filter(i => i.categoryId === effectiveCatFilter);
      }
    }
    if (filterStatus === 'in')  items = items.filter(i => i.status === 0 && (i.quantity||0) > 0);
    if (filterStatus === 'out') items = items.filter(i => i.status === 1 || (i.quantity||0) === 0);
    if (filterRating > 0) items = items.filter(i => (i.rating||0) >= filterRating);
    if (filterPriceMin !== '') items = items.filter(i => (Number(i.purchasePrice)||0) >= Number(filterPriceMin));
    if (filterPriceMax !== '') items = items.filter(i => (Number(i.purchasePrice)||0) <= Number(filterPriceMax));
    if (filterExpiry === 'hasExpiry') items = items.filter(i => !!i.expirationDate);
    if (filterExpiry === 'expired') items = items.filter(i => { const s = expiryStatus(i.expirationDate); return s && s.level === 0; });
    if (filterExpiry === 'expiringSoon') items = items.filter(i => { const s = expiryStatus(i.expirationDate); return s && s.level <= 2; });
    if (filterBrand) items = items.filter(i => (i.brand||'').toLowerCase().includes(filterBrand.toLowerCase()));
    if (filterAttrKey) {
      items = items.filter(i => store.itemAttributes.some(a => a.itemId===i.id && a.key===filterAttrKey && (filterAttrValue==='' || a.value===filterAttrValue)));
    }
    if (filterExpiryDays !== '') {
      const days = Number(filterExpiryDays);
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() + days);
      items = items.filter(i => i.expirationDate && new Date(i.expirationDate) <= cutoff && new Date(i.expirationDate) >= new Date());
    }
    return items.sort((a,b) => {
      if (sortBy === 'name') return a.name.localeCompare(b.name);
      if (sortBy === 'price') return (Number(b.purchasePrice)||0) - (Number(a.purchasePrice)||0);
      if (sortBy === 'timesUsed') return (b.timesUsed||0) - (a.timesUsed||0);
      if (sortBy === 'rating') return (b.rating||0) - (a.rating||0);
      if (sortBy === 'cpw') {
        const aCpw = (a.timesUsed||0)>0 ? (Number(a.purchasePrice)||0)/(a.timesUsed) : Infinity;
        const bCpw = (b.timesUsed||0)>0 ? (Number(b.purchasePrice)||0)/(b.timesUsed) : Infinity;
        return aCpw - bCpw;
      }
      if (sortBy === 'dailyCost') {
        const refDateA = a.purchaseDate || a.createdAt || today();
        const refDateB = b.purchaseDate || b.createdAt || today();
        const daysA = Math.max(1, daysBetween(refDateA.slice(0,10), today()));
        const daysB = Math.max(1, daysBetween(refDateB.slice(0,10), today()));
        const aD = (Number(a.purchasePrice)||0) / daysA;
        const bD = (Number(b.purchasePrice)||0) / daysB;
        return aD - bD;
      }
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
  }, [store.items, store.itemAttributes, store.categories, search, effectiveCatFilter, sortBy, filterStatus, filterRating, filterPriceMin, filterPriceMax, filterExpiry, filterBrand, filterAttrKey, filterAttrValue, filterExpiryDays]);

  const sortLabels = { createdAt:'最新添加', name:'名称', price:'价格高低', timesUsed:'使用次数', rating:'评分', cpw:'每次成本(CPW)', dailyCost:'每日成本(CPD)' };

  const handleSaveItem = (formData, attrs, accessories) => {
    if (editingItem) {
      dispatch({ type: 'UPDATE_ITEM', payload: { ...editingItem, ...formData, updatedAt: now() }, attrs, accessories });
    } else {
      dispatch({ type: 'ADD_ITEM', payload: { id: genId(), timesUsed:0, firstUsedAt:null, lastUsedAt:null, createdAt:now(), updatedAt:now(), ...formData }, attrs, accessories });
    }
    setShowItemForm(false); setEditingItem(null);
  };

  const handleRecordUse = (item) => dispatch({ type: 'RECORD_USE', payload: item });
  const handleUpdateQty = (item, delta) => dispatch({ type: 'UPDATE_QTY', payload: { item, delta } });

  return (
    <div style={S.screen}>
      <div style={{ padding:'12px 16px 0' }}>
        <div style={{ position:'relative', marginBottom:'10px' }}>
          <span style={{ position:'absolute', left:'12px', top:'50%', transform:'translateY(-50%)', color:'#8E8E93', fontSize:'16px' }}>🔍</span>
          <input style={{ ...S.input, paddingLeft:'36px' }} placeholder="搜索物品名称、品牌..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div style={{ fontSize:'11px', color:'#8E8E93', marginBottom:'4px', fontWeight:'600', letterSpacing:'0.3px' }}>场景</div>
        <div style={{ display:'flex', gap:'8px', overflowX:'auto', paddingBottom:'6px', marginBottom:'4px' }}>
          <button onClick={() => setScene('')} style={{ flexShrink:0, padding:'6px 14px', borderRadius:'20px', border:'none', background: filterCat==='' ? '#007AFF' : '#E5E5EA', color: filterCat==='' ? '#fff' : '#333', fontSize:'13px', cursor:'pointer', fontWeight: filterCat==='' ? '600':'400' }}>全部</button>
          {scenes.map(sc => (
            <button key={sc.id} onClick={() => setScene(filterCat===sc.id ? '' : sc.id)} style={{ flexShrink:0, padding:'6px 14px', borderRadius:'20px', border:'none', background: filterCat===sc.id ? (sc.colorHex||'#007AFF') : '#E5E5EA', color: filterCat===sc.id ? '#fff' : '#333', fontSize:'13px', cursor:'pointer', fontWeight: filterCat===sc.id ? '600':'400' }}>
              {sc.iconName} {sc.name}
            </button>
          ))}
        </div>
        {filterCat && scenes.find(s=>s.id===filterCat) && subs.filter(s=>s.parentId===filterCat).length > 0 && (
          <>
            <div style={{ fontSize:'11px', color:'#8E8E93', marginBottom:'4px', fontWeight:'600', letterSpacing:'0.3px' }}>分类</div>
            <div style={{ display:'flex', gap:'6px', overflowX:'auto', paddingBottom:'6px', marginBottom:'4px' }}>
              <button onClick={() => setFilterSubCat('')} style={{ flexShrink:0, padding:'5px 12px', borderRadius:'20px', border:'none', background: filterSubCat==='' ? '#5856D6' : '#F0F0F5', color: filterSubCat==='' ? '#fff' : '#555', fontSize:'12px', cursor:'pointer' }}>全部</button>
              {subs.filter(s=>s.parentId===filterCat).map(sub => (
                <button key={sub.id} onClick={() => setFilterSubCat(filterSubCat===sub.id ? '' : sub.id)} style={{ flexShrink:0, padding:'5px 12px', borderRadius:'20px', border:'none', background: filterSubCat===sub.id ? (sub.colorHex||'#5856D6') : '#F0F0F5', color: filterSubCat===sub.id ? '#fff' : '#555', fontSize:'12px', cursor:'pointer' }}>
                  {sub.iconName} {sub.name}
                </button>
              ))}
            </div>
          </>
        )}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px', gap:'8px' }}>
          <button onClick={() => setShowSort(true)} style={{ fontSize:'13px', color:'#007AFF', background:'none', border:'none', cursor:'pointer', flexShrink:0 }}>排序: {sortLabels[sortBy]} ▾</button>
          <button onClick={() => setShowFilter(true)} style={{ fontSize:'13px', color: hasAdvFilter ? '#FF9500':'#007AFF', background:'none', border:'none', cursor:'pointer', flexShrink:0 }}>{hasAdvFilter ? '★ ' : ''}筛选 ▾</button>
          <span style={{ fontSize:'13px', color:'#8E8E93', flex:1, textAlign:'center' }}>{allItems.length} 件</span>
          <button style={S.btnSm()} onClick={() => { setEditingItem(null); setShowItemForm(true); }}>+ 添加</button>
        </div>
      </div>

      <div style={{ padding:'0 16px 8px' }}>
        {allItems.length === 0 ? (
          <div style={{ ...S.card, padding:'48px', textAlign:'center', color:'#8E8E93' }}>
            {search || filterCat || hasAdvFilter ? '没有匹配的物品' : '还没有物品，点击 + 添加'}
          </div>
        ) : (
          <div style={S.card}>
            {allItems.map((item, i) => (
              <ItemRow key={item.id} item={item} categories={store.categories} allItems={store.items} isLast={i===allItems.length-1}
                onTap={() => setDetailItem(item)} onRecordUse={handleRecordUse} sortBy={sortBy}
                onUpdateQty={(item,delta) => dispatch({ type:'UPDATE_QTY', payload:{ item, delta } })} />
            ))}
          </div>
        )}
      </div>

      <Sheet open={showSort} onClose={() => setShowSort(false)} title="排序方式">
        <div style={{ padding:'8px 16px 32px' }}>
          {Object.entries(sortLabels).map(([k,v]) => (
            <button key={k} onClick={() => { setSortBy(k); setShowSort(false); }}
              style={{ ...S.row, background: k===sortBy ? '#007AFF11':'#fff', borderRadius:'12px', marginBottom:'6px', border:'none', width:'100%', textAlign:'left', fontSize:'15px', fontWeight: k===sortBy ? '600':'400', color: k===sortBy ? '#007AFF':'#1C1C1E' }}>
              {v} {k===sortBy ? '✓' : null}
            </button>
          ))}
        </div>
      </Sheet>

      <Sheet open={showFilter} onClose={() => setShowFilter(false)} title="高级筛选">
        <div style={{ padding:'16px', paddingBottom:'32px' }}>
          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>状态</div>
            <div style={{ display:'flex', gap:'8px' }}>
              {[['all','全部'],['in','在库'],['out','出库']].map(([v,l]) => (
                <button key={v} onClick={() => setFilterStatus(v)} style={{ flex:1, padding:'8px', borderRadius:'10px', border:'none', background: filterStatus===v ? '#007AFF':'#E5E5EA', color: filterStatus===v ? '#fff':'#333', fontSize:'14px', cursor:'pointer', fontWeight: filterStatus===v ? '600':'400' }}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>评分不低于</div>
            <div style={{ display:'flex', gap:'8px' }}>
              <button onClick={() => setFilterRating(0)} style={{ flex:1, padding:'8px', borderRadius:'10px', border:'none', background: filterRating===0 ? '#007AFF':'#E5E5EA', color: filterRating===0 ? '#fff':'#333', fontSize:'13px', cursor:'pointer' }}>不限</button>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => setFilterRating(filterRating===n ? 0 : n)} style={{ flex:1, padding:'8px', borderRadius:'10px', border:'none', background: filterRating===n ? '#FF9500':'#E5E5EA', color: filterRating===n ? '#fff':'#333', fontSize:'12px', cursor:'pointer' }}>{'★'.repeat(n)}</button>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:'20px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>价格范围（¥）</div>
            <div style={{ display:'flex', gap:'8px', alignItems:'center' }}>
              <input style={{ ...S.input, flex:1 }} type="number" placeholder="最低" value={filterPriceMin} onChange={e => setFilterPriceMin(e.target.value)} />
              <span style={{ color:'#8E8E93' }}>-</span>
              <input style={{ ...S.input, flex:1 }} type="number" placeholder="最高" value={filterPriceMax} onChange={e => setFilterPriceMax(e.target.value)} />
            </div>
          </div>
          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>到期状态</div>
            <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
              {[['all','全部'],['hasExpiry','有到期日'],['expiringSoon','30天内到期'],['expired','已过期']].map(([v,l]) => (
                <button key={v} onClick={() => setFilterExpiry(v)} style={{ flex:1, padding:'8px', borderRadius:'10px', border:'none', background: filterExpiry===v ? (v==='expired'?'#FF3B30':v==='expiringSoon'?'#FF9500':'#007AFF') : '#E5E5EA', color: filterExpiry===v ? '#fff':'#333', fontSize:'13px', cursor:'pointer', fontWeight: filterExpiry===v ? '600':'400', minWidth:'70px' }}>{l}</button>
              ))}
            </div>
          </div>
          {/* 品牌筛选 */}
          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>品牌</div>
            <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
              <button onClick={() => setFilterBrand('')} style={{ padding:'6px 12px', borderRadius:'16px', border:'none', background: filterBrand==='' ? '#007AFF':'#E5E5EA', color: filterBrand==='' ? '#fff':'#333', fontSize:'12px', cursor:'pointer' }}>全部</button>
              {loadBrands().map(b => (
                <button key={b.id} onClick={() => setFilterBrand(filterBrand===b.name ? '' : b.name)} style={{ padding:'6px 12px', borderRadius:'16px', border:'none', background: filterBrand===b.name ? '#007AFF':'#E5E5EA', color: filterBrand===b.name ? '#fff':'#333', fontSize:'12px', cursor:'pointer' }}>{b.name}</button>
              ))}
            </div>
            {loadBrands().length === 0 && <div style={{ fontSize:'12px', color:'#8E8E93', marginTop:'4px' }}>还没有品牌，可在设置中添加</div>}
          </div>
          {/* 属性筛选 */}
          <div style={{ marginBottom:'16px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>属性筛选</div>
            <select style={{ ...S.input, marginBottom:'6px' }} value={filterAttrKey} onChange={e => { setFilterAttrKey(e.target.value); setFilterAttrValue(''); }}>
              <option value="">选择属性名...</option>
              {Array.from(new Set(store.itemAttributes.map(a=>a.key).filter(Boolean))).map(k => (
                <option key={k} value={k}>{k}</option>
              ))}
            </select>
            {filterAttrKey && (() => {
              const vals = Array.from(new Set(store.itemAttributes.filter(a=>a.key===filterAttrKey).map(a=>a.value).filter(Boolean)));
              return vals.length > 0 ? (
                <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
                  <button onClick={() => setFilterAttrValue('')} style={{ padding:'5px 10px', borderRadius:'14px', border:'none', background: filterAttrValue==='' ? '#5856D6':'#E5E5EA', color: filterAttrValue==='' ? '#fff':'#333', fontSize:'12px', cursor:'pointer' }}>全部</button>
                  {vals.map(v => (
                    <button key={v} onClick={() => setFilterAttrValue(filterAttrValue===v ? '' : v)} style={{ padding:'5px 10px', borderRadius:'14px', border:'none', background: filterAttrValue===v ? '#5856D6':'#E5E5EA', color: filterAttrValue===v ? '#fff':'#333', fontSize:'12px', cursor:'pointer' }}>{v}</button>
                  ))}
                </div>
              ) : null;
            })()}
          </div>
          {/* 预计到期筛选 */}
          <div style={{ marginBottom:'20px' }}>
            <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>预计N天内到期</div>
            <div style={{ display:'flex', gap:'6px', alignItems:'center', marginBottom:'6px' }}>
              {[7,30,90].map(d => (
                <button key={d} onClick={() => setFilterExpiryDays(filterExpiryDays==String(d) ? '' : String(d))} style={{ flex:1, padding:'8px', borderRadius:'10px', border:'none', background: filterExpiryDays==String(d) ? '#FF9500':'#E5E5EA', color: filterExpiryDays==String(d) ? '#fff':'#333', fontSize:'13px', cursor:'pointer' }}>{d}天</button>
              ))}
            </div>
            <input style={S.input} type="number" placeholder="自定义天数" value={filterExpiryDays} onChange={e => setFilterExpiryDays(e.target.value)} min="1" />
          </div>
          <button style={S.btn()} onClick={() => setShowFilter(false)}>确定</button>
          {hasAdvFilter && <button style={{ ...S.btn('#8E8E93'), marginTop:'8px' }} onClick={() => { setFilterStatus('in'); setFilterRating(0); setFilterPriceMin(''); setFilterPriceMax(''); setFilterExpiry('all'); setFilterBrand(''); setFilterAttrKey(''); setFilterAttrValue(''); setFilterExpiryDays(''); setShowFilter(false); }}>重置筛选</button>}
        </div>
      </Sheet>

      <Sheet open={showItemForm} onClose={() => { setShowItemForm(false); setEditingItem(null); }} title={editingItem ? '编辑物品':'添加物品'}>
        <ItemForm initial={editingItem ? { ...editingItem, _attrs: store.itemAttributes.filter(a=>a.itemId===editingItem.id), _accessories: store.items.filter(i=>i.parentItemId===editingItem.id) } : {}}
          categories={store.categories} allItems={store.items} onSave={handleSaveItem} onClose={() => { setShowItemForm(false); setEditingItem(null); }} />
      </Sheet>

      <Sheet open={!!detailItem} onClose={() => setDetailItem(null)} title="物品详情">
        <ItemDetailSheet item={detailItem} store={store}
          onClose={() => setDetailItem(null)}
          onEdit={() => { setEditingItem(detailItem); setDetailItem(null); setShowItemForm(true); }}
          onDelete={() => { if(window.confirm('确认删除?')) { dispatch({type:'DELETE_ITEM', payload: detailItem.id}); setDetailItem(null); }}}
          onRecordUse={handleRecordUse}
          onUpdateQty={handleUpdateQty} />
      </Sheet>
    </div>
  );
}

// ─── EXPIRY TAB ───────────────────────────────────────────────────────────────
function ExpiryTab({ store, dispatch }) {
  const [detailItem, setDetailItem] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [showItemForm, setShowItemForm] = useState(false);
  const [expiryFilter, setExpiryFilter] = useState('all'); // all | expired | soon7 | soon30

  const itemsWithExpiry = store.items.filter(i => i.expirationDate && !i.parentItemId)
    .map(i => ({ ...i, _status: expiryStatus(i.expirationDate) }))
    .sort((a,b) => new Date(a.expirationDate) - new Date(b.expirationDate));

  const allGroups = [
    { key:0, label:'已过期', color:'#FF3B30', items: itemsWithExpiry.filter(i=>i._status.level===0) },
    { key:1, label:'7天内到期', color:'#FF9500', items: itemsWithExpiry.filter(i=>i._status.level===1) },
    { key:2, label:'30天内到期', color:'#FFCC00', items: itemsWithExpiry.filter(i=>i._status.level===2) },
    { key:3, label:'日期正常', color:'#34C759', items: itemsWithExpiry.filter(i=>i._status.level===3) },
  ];
  const filterMap = { all: null, expired: 0, soon7: 1, soon30: 2 };
  const groups = (expiryFilter === 'all' ? allGroups : allGroups.filter(g => g.key === filterMap[expiryFilter]))
    .filter(g => g.items.length > 0);

  const handleSaveItem = (formData, attrs) => {
    dispatch({ type: 'UPDATE_ITEM', payload: { ...editingItem, ...formData, updatedAt: now() }, attrs });
    setShowItemForm(false); setEditingItem(null);
  };
  const handleRecordUse = (item) => dispatch({ type: 'RECORD_USE', payload: item });
  const handleUpdateQty = (item, delta) => dispatch({ type: 'UPDATE_QTY', payload: { item, delta } });
  const handleOutStock = (item) => {
    dispatch({ type: 'UPDATE_ITEM', payload: { ...item, status: 1, updatedAt: now() }, attrs: store.itemAttributes.filter(a=>a.itemId===item.id), accessories: store.items.filter(i=>i.parentItemId===item.id) });
  };
  const handleBatchOutStock = (items) => {
    if (!window.confirm(`确认将 ${items.length} 件已过期物品全部出库？`)) return;
    items.forEach(item => handleOutStock(item));
  };

  const expiredCount = allGroups[0].items.length;
  const soon7Count = allGroups[1].items.length;
  const soon30Count = allGroups[2].items.length;

  return (
    <div style={S.screen}>
      <div style={{ padding:'16px 16px 0' }}>
        {/* 统计汇总卡片 */}
        {itemsWithExpiry.length > 0 && (
          <div style={{ ...S.card, padding:'12px 16px', marginBottom:'16px', display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'8px', textAlign:'center' }}>
            {[
              { label:'已过期', count: expiredCount, color:'#FF3B30' },
              { label:'7天内', count: soon7Count, color:'#FF9500' },
              { label:'30天内', count: soon30Count, color:'#FFCC00' },
              { label:'全部有效期', count: itemsWithExpiry.length, color:'#34C759' },
            ].map(s => (
              <div key={s.label}>
                <div style={{ fontSize:'20px', fontWeight:'700', color: s.count>0 ? s.color : '#8E8E93' }}>{s.count}</div>
                <div style={{ fontSize:'11px', color:'#8E8E93', marginTop:'2px' }}>{s.label}</div>
              </div>
            ))}
          </div>
        )}
        {/* 筛选 chips */}
        {itemsWithExpiry.length > 0 && (
          <div style={{ display:'flex', gap:'8px', marginBottom:'12px', overflowX:'auto', paddingBottom:'2px' }}>
            {[['all','全部'],['expired','已过期'],['soon7','7天内'],['soon30','30天内']].map(([v,l]) => (
              <button key={v} onClick={() => setExpiryFilter(v)}
                style={{ padding:'6px 14px', borderRadius:'16px', border:'none', whiteSpace:'nowrap',
                  background: expiryFilter===v ? '#007AFF':'#E5E5EA',
                  color: expiryFilter===v ? '#fff':'#333',
                  fontSize:'13px', cursor:'pointer', fontWeight: expiryFilter===v ? '600':'400' }}>{l}</button>
            ))}
          </div>
        )}

        {itemsWithExpiry.length === 0 ? (
          <div style={{ ...S.card, padding:'48px 16px', textAlign:'center', color:'#8E8E93' }}>
            <div style={{ fontSize:'48px', marginBottom:'12px' }}>⏰</div>
            <div style={{ fontSize:'16px' }}>没有设置有效期的物品</div>
            <div style={{ fontSize:'13px', marginTop:'6px' }}>在添加/编辑物品时设置有效期</div>
          </div>
        ) : groups.length === 0 ? (
          <div style={{ ...S.card, padding:'32px 16px', textAlign:'center', color:'#8E8E93' }}>
            <div style={{ fontSize:'16px' }}>该分类暂无物品</div>
          </div>
        ) : (
          groups.map(group => (
            <div key={group.key} style={{ marginBottom:'16px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'8px' }}>
                <div style={{ width:'10px', height:'10px', borderRadius:'50%', background:group.color }} />
                <div style={{ fontSize:'14px', fontWeight:'600', color:'#6C6C70', flex:1 }}>{group.label}</div>
                <div style={{ fontSize:'13px', color:'#8E8E93' }}>{group.items.length} 件</div>
                {group.key === 0 && group.items.length > 1 && (
                  <button onClick={() => handleBatchOutStock(group.items)}
                    style={{ padding:'4px 10px', borderRadius:'8px', background:'#FF3B30', color:'#fff', fontSize:'12px', border:'none', cursor:'pointer' }}>
                    全部出库
                  </button>
                )}
              </div>
              <div style={S.card}>
                {group.items.map((item, i) => {
                  const diff = daysBetween(today(), item.expirationDate);
                  const cat = store.categories.find(c => c.id === item.categoryId);
                  return (
                    <div key={item.id} style={{ ...S.row, ...(i===group.items.length-1 ? S.rowLast : {}), flexDirection:'column', alignItems:'stretch', padding:'12px 14px', gap:0 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:'10px' }} onClick={() => setDetailItem(item)}>
                        <div style={S.emojiBox(item.colorHex||cat?.colorHex||'#007AFF')}>{item.iconName||'📦'}</div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:'15px', fontWeight:'500', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{item.name}</div>
                          <div style={{ fontSize:'12px', color:'#8E8E93', marginTop:'2px', display:'flex', gap:'6px', flexWrap:'wrap' }}>
                            {cat && <span>{cat.iconName} {cat.name}</span>}
                            {item.brand && <span>· {item.brand}</span>}
                            {item.purchasePrice ? <span>· ¥{Number(item.purchasePrice).toFixed(2)}</span> : null}
                          </div>
                          <div style={{ fontSize:'12px', marginTop:'3px', display:'flex', gap:'8px', alignItems:'center' }}>
                            <span style={{ color:'#6C6C70' }}>有效期：{fmt(item.expirationDate)}</span>
                            {diff < 0
                              ? <span style={{ ...S.tag('#FF3B30'), fontSize:'11px' }}>已过期 {-diff}天</span>
                              : diff === 0
                              ? <span style={{ ...S.tag('#FF3B30'), fontSize:'11px' }}>今天到期</span>
                              : <span style={{ ...S.tag(group.color), fontSize:'11px' }}>剩余 {diff}天</span>
                            }
                          </div>
                        </div>
                      </div>
                      {/* 操作按鈕行 */}
                      <div style={{ display:'flex', gap:'8px', marginTop:'10px', paddingLeft:'52px' }}>
                        {group.key === 0 ? (
                          <button onClick={e=>{e.stopPropagation();handleOutStock(item);}}
                            style={{ padding:'5px 14px', borderRadius:'8px', background:'#FF3B30', color:'#fff', fontSize:'12px', border:'none', cursor:'pointer' }}>
                            出库
                          </button>
                        ) : (
                          <button onClick={e=>{e.stopPropagation();handleRecordUse(item);}}
                            style={{ padding:'5px 14px', borderRadius:'8px', background:'#007AFF', color:'#fff', fontSize:'12px', border:'none', cursor:'pointer' }}>
                            ✓ 记录使用
                          </button>
                        )}
                        <button onClick={e=>{e.stopPropagation();setEditingItem(item);setShowItemForm(true);}}
                          style={{ padding:'5px 14px', borderRadius:'8px', background:'#E5E5EA', color:'#333', fontSize:'12px', border:'none', cursor:'pointer' }}>
                          编辑有效期
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))
        )}
      </div>

      <Sheet open={!!detailItem} onClose={() => setDetailItem(null)} title="物品详情">
        <ItemDetailSheet item={detailItem} store={store}
          onClose={() => setDetailItem(null)}
          onEdit={() => { setEditingItem(detailItem); setDetailItem(null); setShowItemForm(true); }}
          onDelete={() => { if(window.confirm('确认删除?')) { dispatch({type:'DELETE_ITEM', payload: detailItem.id}); setDetailItem(null); }}}
          onRecordUse={handleRecordUse}
          onUpdateQty={handleUpdateQty} />
      </Sheet>

      <Sheet open={showItemForm} onClose={() => { setShowItemForm(false); setEditingItem(null); }} title="编辑物品">
        {editingItem && <ItemForm initial={{ ...editingItem, _attrs: store.itemAttributes.filter(a=>a.itemId===editingItem.id) }}
          categories={store.categories} allItems={store.items} onSave={handleSaveItem} onClose={() => { setShowItemForm(false); setEditingItem(null); }} />}
      </Sheet>
    </div>
  );
}

// ─── SETTINGS TAB placeholder to keep marker ─────────────────────────────────
// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({ store, dispatch }) { // eslint-disable-line
  // Units management
  const [units, setUnits] = useState(() => loadUnits());
  const [showUnitMgr, setShowUnitMgr] = useState(false);
  const [newUnitName, setNewUnitName] = useState('');

  const saveUnitList = (list) => { setUnits(list); saveUnits(list); };
  const addUnit = () => {
    const name = newUnitName.trim();
    if (!name) return alert('请输入单位名称');
    if (units.includes(name)) return alert('该单位已存在');
    saveUnitList([...units, name]);
    setNewUnitName('');
  };
  const deleteUnit = (name) => {
    if (!window.confirm('确认删除单位「' + name + '」？')) return;
    saveUnitList(units.filter(u => u !== name));
  };
  const resetUnits = () => {
    if (!window.confirm('确认恢复默认单位列表？')) return;
    saveUnitList([...DEFAULT_UNITS]);
  };

  // Brands management
  const [brands, setBrands] = useState(() => loadBrands());
  const [showBrandMgr, setShowBrandMgr] = useState(false);
  const [newBrandName, setNewBrandName] = useState('');
  const [newBrandNote, setNewBrandNote] = useState('');

  const saveBrandList = (list) => { setBrands(list); saveBrands(list); };
  const addBrand = () => {
    if (!newBrandName.trim()) return alert('请输入品牌名称');
    const newBrand = { id: genId(), name: newBrandName.trim(), note: newBrandNote.trim(), sceneId: '', sortOrder: brands.length };
    saveBrandList([...brands, newBrand]);
    setNewBrandName(''); setNewBrandNote('');
  };
  const deleteBrand = (id) => {
    if (!window.confirm('确认删除该品牌？')) return;
    saveBrandList(brands.filter(b => b.id !== id));
  };

  // Attribute templates management (new format: { categoryId: [{id,key,options,sortOrder}] })
  const [attrTemplates, setAttrTemplates] = useState(() => loadAttrTemplates());
  const [showAttrMgr, setShowAttrMgr] = useState(false);
  const [selectedTplCat, setSelectedTplCat] = useState('');
  const [newTplKey, setNewTplKey] = useState('');
  const [newTplOptions, setNewTplOptions] = useState('');

  const saveAttrTpl = (tpls) => { setAttrTemplates(tpls); saveAttrTemplates(tpls); };

  const addAttrTemplate = () => {
    if (!selectedTplCat) return alert('请先选择分类');
    if (!newTplKey.trim()) return alert('请输入属性名');
    const options = newTplOptions.split(',').map(s => s.trim()).filter(Boolean);
    const catTpls = attrTemplates[selectedTplCat] || [];
    const newTpl = { id: genId(), key: newTplKey.trim(), options, sortOrder: catTpls.length };
    saveAttrTpl({ ...attrTemplates, [selectedTplCat]: [...catTpls, newTpl] });
    setNewTplKey(''); setNewTplOptions('');
  };

  const deleteAttrTemplate = (catId, tplId) => {
    if (!window.confirm('确认删除该属性模板？')) return;
    const catTpls = (attrTemplates[catId] || []).filter(t => t.id !== tplId);
    saveAttrTpl({ ...attrTemplates, [catId]: catTpls });
  };

  const allCats = store.categories;
  const selectedTplCatTpls = selectedTplCat ? (attrTemplates[selectedTplCat] || []) : [];

  const exportCSV = () => {
    const rows = [
      ['名称','品牌','备注','分类','价格','购入日期','数量','评分','状态','有效期','使用次数','首次使用','最近使用'],
      ...store.items.filter(i=>!i.parentItemId).map(item => {
        const cat = store.categories.find(c=>c.id===item.categoryId);
        return [
          item.name, item.brand||'', item.notes||'',
          cat ? cat.name : '',
          item.purchasePrice||'', item.purchaseDate||'',
          item.quantity||1, item.rating||0,
          item.status===0?'在库':'出库',
          item.expirationDate||'',
          item.timesUsed||0, item.firstUsedAt||'', item.lastUsedAt||''
        ];
      })
    ];
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `stuffbox_${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  const importJSON = () => {

    input.type = 'file'; input.accept = '.json';

      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.items || !data.categories) throw new Error('格式错误');
          if (!window.confirm('确认导入？将覆盖当前所有数据')) return;
          dispatch({ type: 'REPLACE_STORE', payload: { ...emptyStore(), ...data } });

      reader.readAsText(file);

              <div style={{ fontSize:'13px', fontWeight:'600', color:'#6C6C70', marginBottom:'8px' }}>

              {selectedTplCatTpls.length === 0 ? (
                <div style={{ textAlign:'center', color:'#8E8E93', padding:'20px', fontSize:'14px', background:'#fff', borderRadius:'12px' }}>

                </div>
              ) : (
                <div style={S.card}>
                  {selectedTplCatTpls.map((tpl, i) => (
                    <div key={tpl.id} style={{ display:'flex', alignItems:'flex-start', gap:'10px', padding:'12px 16px', borderBottom: i<selectedTplCatTpls.length-1 ? '1px solid rgba(0,0,0,0.06)':'' }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:'14px', fontWeight:'600' }}>{tpl.key}</div>
                        {tpl.options && tpl.options.length > 0 && (
                          <div style={{ display:'flex', flexWrap:'wrap', gap:'4px', marginTop:'4px' }}>
                            {tpl.options.map((opt, oi) => (
                              <span key={oi} style={{ background:'#E5E5EA', borderRadius:'10px', padding:'2px 8px', fontSize:'11px', color:'#555' }}>{opt}</span>
                            ))}
                          </div>
                        )}
                      </div>
                      <button onClick={() => deleteAttrTemplate(selectedTplCat, tpl.id)} style={{ color:'#FF3B30', fontSize:'18px', border:'none', background:'none', cursor:'pointer', padding:'0 4px', flexShrink:0 }}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {!selectedTplCat && (
            <div style={{ textAlign:'center', color:'#8E8E93', padding:'24px', fontSize:'14px' }}>请先选择分类以管理属性模板</div>
          )}
        </div>
      </Sheet>
    </div>
  );
}

// ─── Reducer ──────────────────────────────────────────────────────────────────
function reducer(store, action) {
  switch (action.type) {
    case 'ADD_CAT':
      return { ...store, categories: [...store.categories, action.payload] };
    case 'UPDATE_CAT':
      return { ...store, categories: store.categories.map(c => c.id===action.payload.id ? action.payload : c) };
    case 'DELETE_CAT': {
      const id = action.payload;
      const subIds = store.categories.filter(c => c.parentId===id).map(c=>c.id);
      const allRemoved = [id, ...subIds];
      return {
        ...store,
        categories: store.categories.filter(c => !allRemoved.includes(c.id)),
        items: store.items.map(i => allRemoved.includes(i.categoryId) ? { ...i, categoryId: '' } : i),
      };
    }
    case 'ADD_ITEM': {
      const item = action.payload;
      const newAttrs = (action.attrs||[]).map((a,i) => ({ ...a, id: a.id||genId(), itemId: item.id, sortOrder: i }));
      const newAccs = (action.accessories||[]).map(acc => ({ ...acc, parentItemId: item.id, categoryId: item.categoryId||'' }));
      return { ...store, items: [...store.items, item, ...newAccs], itemAttributes: [...store.itemAttributes, ...newAttrs] };
    }
    case 'UPDATE_ITEM': {
      const item = action.payload;
      const oldAttrs = store.itemAttributes.filter(a => a.itemId !== item.id);
      const newAttrs = (action.attrs||[]).map((a,i) => ({ ...a, id: a.id||genId(), itemId: item.id, sortOrder: i }));
      const oldAccIds = store.items.filter(i => i.parentItemId === item.id).map(i => i.id);
      const newAccIds = (action.accessories||[]).map(a => a.id);
      const removedAccIds = oldAccIds.filter(id => !newAccIds.includes(id));
      const addedAccs = (action.accessories||[]).filter(a => !oldAccIds.includes(a.id)).map(a => ({ ...a, parentItemId: item.id, categoryId: item.categoryId||'' }));
      const itemsAfter = store.items
        .filter(i => !removedAccIds.includes(i.id))
        .map(i => i.id===item.id ? item : i);
      return { ...store, items: [...itemsAfter, ...addedAccs], itemAttributes: [...oldAttrs, ...newAttrs] };
    }
    case 'DELETE_ITEM':
      return {
        ...store,
        items: store.items.filter(i => i.id!==action.payload && i.parentItemId!==action.payload),
        usageRecords: store.usageRecords.filter(r => r.itemId!==action.payload),
        stockRecords: store.stockRecords.filter(r => r.itemId!==action.payload),
        itemAttributes: store.itemAttributes.filter(a => a.itemId!==action.payload),
      };
    case 'RECORD_USE': {
      const item = action.payload;
      const n = now();
      const record = { id: genId(), itemId: item.id, date: today(), notes: '' };
      return {
        ...store,
        items: store.items.map(i => i.id===item.id ? {
          ...i, timesUsed: (i.timesUsed||0)+1, lastUsedAt: n, firstUsedAt: i.firstUsedAt || n, updatedAt: n
        } : i),
        usageRecords: [...store.usageRecords, record],
      };
    }
    case 'UPDATE_QTY': {
      const { item, delta } = action.payload;
      const newQty = Math.max(0, (Number(item.quantity)||0) + delta);
      const n = now();
      const record = { id: genId(), itemId: item.id, type: delta > 0 ? 0 : 1, quantity: Math.abs(delta), date: today(), notes: '' };
      return {
        ...store,
        items: store.items.map(i => i.id===item.id ? { ...i, quantity: newQty, updatedAt: n } : i),
        stockRecords: [...store.stockRecords, record],
      };
    }
    case 'REORDER_CATS': {
      // action.ids: new order array (categoryId[])
      const idOrder = action.ids;
      const newCats = [...store.categories];
      idOrder.forEach((id, idx) => {
        const cat = newCats.find(c => c.id === id);
        if (cat) cat.sortOrder = idx;
      });
      return { ...store, categories: newCats };
    }
    case 'REPLACE_STORE':
      return action.payload;
    default:
      return store;
  }
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(0);
  const [store, dispatch_] = React.useReducer(reducer, null, loadStore);
  const [itemsSortBy, setItemsSortBy] = useState(() => {
    try { return localStorage.getItem('stuffbox_sort') || 'createdAt'; } catch { return 'createdAt'; }
  });

  const handleSetItemsSortBy = (v) => {
    setItemsSortBy(v);
    try { localStorage.setItem('stuffbox_sort', v); } catch {}
  };

  const dispatch = useCallback((action) => {
    dispatch_(action);
  }, []);

  useEffect(() => {
    saveStore(store);
  }, [store]);

  useEffect(() => {
    // Debug: show actual URL and storage info
    const loc = window.location.href;
    const isStandalone = window.navigator.standalone;
    const debugShown = sessionStorage.getItem('_debug_shown');
    if (!debugShown) {
      sessionStorage.setItem('_debug_shown', '1');
      const dataSize = localStorage.getItem('stuffbox_data') ? JSON.parse(localStorage.getItem('stuffbox_data')).items?.length : 0;
      setTimeout(() => alert(
        '模式: ' + (isStandalone ? 'PWA主屏幕' : 'Safari浏览器') + '\n' +
        'URL: ' + loc + '\n' +
        '物品数量: ' + (dataSize || 0)
      ), 800);
    }
    if ('serviceWorker' in navigator) {
      // Unregister any old service workers first, then register new one
      navigator.serviceWorker.getRegistrations().then(regs => {
        const unregPromises = regs.map(r => r.unregister());
        return Promise.all(unregPromises);
      }).then(() => {
        return navigator.serviceWorker.register('sw.js');
      }).catch(() => {});
    }
  }, []);

  const tabs = [
    { icon: '🏠', label: '首页' },
    { icon: '📦', label: '我的物品' },
    { icon: '⏰', label: '到期' },
    { icon: '⚙️', label: '设置' },
  ];

  const expiringSoon = store.items.filter(i => {
    if (!i.expirationDate || i.parentItemId) return false;
    const s = expiryStatus(i.expirationDate);
    return s && s.level <= 1;
  }).length;

  return (
    <div style={S.app}>
      {tab === 0 && <HomeTab store={store} dispatch={dispatch} />}
      {tab === 1 && <ItemsTab store={store} dispatch={dispatch} sortByExternal={itemsSortBy} onSortByChange={handleSetItemsSortBy} />}
      {tab === 2 && <ExpiryTab store={store} dispatch={dispatch} />}
      {tab === 3 && <SettingsTab store={store} dispatch={dispatch} />}

      {/* Tab Bar */}
      <div style={S.tabBar}>
        {tabs.map((t, i) => (
          <button key={i} style={S.tabItem(tab===i)} onClick={() => setTab(i)}>
            <div style={{ position:'relative', fontSize:'24px', lineHeight:1 }}>
              {t.icon}
              {i===2 && expiringSoon > 0 && (
                <div style={{ position:'absolute', top:'-4px', right:'-6px', background:'#FF3B30', color:'#fff', borderRadius:'10px', fontSize:'9px', minWidth:'16px', height:'16px', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', padding:'0 3px' }}>
                  {expiringSoon}
                </div>
              )}
            </div>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
